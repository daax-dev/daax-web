name: Publish container images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  daax-web:
    name: Publish daax-web
    runs-on: ubuntu-latest
    outputs:
      # Digest-pinned ref for the SBOM job (F2, #97) — never a mutable tag.
      image: ghcr.io/daax-dev/daax-web@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/daax-dev/daax-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          # amd64 only: cloud VMs (Azure x86_64) are amd64, and the arm64 build
          # compiles node-pty from source under QEMU emulation — minutes → ~30m+
          # and fragile. code-server below stays multi-arch (no native compile).
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            BUILD_HOST=github-actions
            BUILD_BRANCH=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  code-server:
    name: Publish code-server
    runs-on: ubuntu-latest
    outputs:
      image: ghcr.io/daax-dev/code-server@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/daax-dev/code-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: deploy/code-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # F2 (#97): generate a real SBOM (CycloneDX + SPDX) for each published image,
  # keyed by the pushed digest, and upload as workflow artifacts (4 total:
  # {daax-web, code-server} × {cyclonedx-json, spdx-json}). A placeholder-vs-real
  # guard rejects an empty/undersized SBOM so a fake-present SBOM is never shipped.
  # Runtime catalog builds populate built_images.sbom_json separately (the DB is
  # not reachable from CI); these artifacts feed the F8 build-provenance page (#99).
  sbom:
    name: SBOM (${{ matrix.name }}, ${{ matrix.format }})
    needs: [daax-web, code-server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: daax-web, format: cyclonedx-json }
          - { name: daax-web, format: spdx-json }
          - { name: code-server, format: cyclonedx-json }
          - { name: code-server, format: spdx-json }
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.name == 'daax-web' && needs.daax-web.outputs.image || needs.code-server.outputs.image }}
          format: ${{ matrix.format }}
          output-file: sbom-${{ matrix.name }}-${{ matrix.format }}.json
          upload-artifact: false

      - name: Guard placeholder-vs-real
        run: |
          file="sbom-${{ matrix.name }}-${{ matrix.format }}.json"
          node -e '
            const fs = require("fs");
            const f = process.argv[1];
            const raw = fs.readFileSync(f, "utf8");
            if (raw.length < 512) { console.error(`::error::SBOM ${f} undersized (${raw.length} bytes) — unavailable, not shipping`); process.exit(1); }
            let o; try { o = JSON.parse(raw); } catch { console.error(`::error::SBOM ${f} unparseable`); process.exit(1); }
            const ok = (Array.isArray(o.components) && o.components.length) || (Array.isArray(o.packages) && o.packages.length);
            if (!ok) { console.error(`::error::SBOM ${f} has no components/packages — unavailable`); process.exit(1); }
            console.log(`SBOM ${f} OK (${raw.length} bytes)`);
          ' "$file"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}-${{ matrix.format }}
          path: sbom-${{ matrix.name }}-${{ matrix.format }}.json
          if-no-files-found: error
