name: CI

# PR quality gates (F4, #96): lint, typecheck, unit tests, build, the auth-drift
# gate, and a dependency vulnerability scan. Runs on every PR to main. Playwright
# E2E is opt-in behind the `e2e` label to bound cost. Wire these as required
# checks in branch protection (operator-only — see the PR description).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint / typecheck / test / build / auth-audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9" # match package.json packageManager pin

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Auth-drift gate (fail on new unguarded write routes)
        run: bun run audit:auth

      - name: Unit tests
        run: bun run test

      - name: Build
        env:
          # Dummy connection string so the build never trips the fail-closed DB
          # config resolver; no DB is contacted at build time.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
        run: bun run build

  container-build:
    name: Container image build (web + terminal targets)
    runs-on: self-hosted
    # F3 split (#100): smoke-build BOTH Dockerfile targets on every PR so a
    # broken `terminal` stage (or `runner`) fails CI instead of only surfacing
    # at deploy time. No push — this only proves the images build. SBOM is
    # skipped (DAAX_SKIP_SBOM=1) to keep the smoke build hermetic (no syft
    # download) and fast; the real SBOM is generated in publish-images.yml.
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build web image (runner target)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner
          push: false
          platforms: linux/amd64
          build-args: |
            DAAX_SKIP_SBOM=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build terminal image (terminal target)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: terminal
          push: false
          platforms: linux/amd64
          build-args: |
            DAAX_SKIP_SBOM=1
          # Reuses the runner layers from the step above via the shared gha cache.
          cache-from: type=gha

  vuln-scan:
    name: Dependency vulnerability scan (Trivy fs)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      # Filesystem scan of dependencies/lockfile. Image scanning runs in
      # publish-images.yml where the image is already built. Report-mode
      # (exit-code 0) so unavoidable upstream CVEs don't wedge every PR; tighten
      # to a blocking threshold once the baseline is triaged.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
          format: table

  e2e:
    name: E2E (Playwright)
    # Only on a labeled PR. Guard event_name so a workflow_dispatch run (no
    # pull_request payload) cleanly skips instead of erroring on the expression.
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: daax
          POSTGRES_PASSWORD: daax
          POSTGRES_DB: daax
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daax -d daax"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://daax:daax@localhost:5432/daax
      # Playwright's config disables its built-in webServer under CI, so this job
      # starts the app itself (below) and points the tests at it.
      DAAX_BASE_URL: http://localhost:4200
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations
        run: bun run db:migrate

      - name: Build
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start app (Next + terminal server) and wait for it
        run: |
          bun run start:prod &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4200/ >/dev/null; then
              echo "app is up"; exit 0
            fi
            sleep 2
          done
          echo "app did not become ready"; exit 1

      - name: E2E tests
        run: bun run test:e2e

      - name: Stop app
        if: always()
        run: kill "${APP_PID}" 2>/dev/null || true
