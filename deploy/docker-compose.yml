# Daax Production Deployment
#
# This compose file is designed for deployment behind Traefik.
# Ports are bound to localhost only - Traefik handles external access.
#
# Usage:
#   docker compose up -d --build        # Build from local source
#   docker compose up -d                # Use existing/cached image

services:
  # Postgres — daax's single data engine (brain2daax Phase 0 #92).
  # Persistent named volume; not published externally (reached only on daax-net).
  # The password MUST be provided via env/secret — fail-closed, never committed.
  postgres:
    image: postgres:18-alpine
    container_name: daax-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DAAX_PG_USER:-daax}
      - POSTGRES_PASSWORD=${DAAX_PG_PASSWORD:?DAAX_PG_PASSWORD env var required (set a strong secret; never commit it)}
      - POSTGRES_DB=${DAAX_PG_DB:-daax}
    volumes:
      # postgres:18 stores data under a version subdir; mount the PARENT so
      # PGDATA (/var/lib/postgresql/<ver>/docker) lands on the volume and
      # persists. Mounting /var/lib/postgresql/data instead silently moves
      # PGDATA off-volume and the image refuses to start.
      - daax-pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DAAX_PG_USER:-daax} -d ${DAAX_PG_DB:-daax}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - daax-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot migration runner: apply pending migrations, then exit. The daax
  # service waits for this to complete successfully, so a bad/failed migration
  # blocks the rollout (fail-closed) without coupling the app process to PG.
  migrate:
    image: daax:latest
    container_name: daax-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DAAX_PG_USER:-daax}:${DAAX_PG_PASSWORD:?DAAX_PG_PASSWORD env var required}@postgres:5432/${DAAX_PG_DB:-daax}
    command: ["bun", "run", "db:migrate"]
    networks:
      - daax-net

  daax:
    build:
      context: ..
      dockerfile: Dockerfile
    image: daax:latest
    container_name: daax
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    ports:
      # Bind to localhost only - Traefik proxies external access
      - "127.0.0.1:4200:4200" # Web UI
      - "127.0.0.1:4201:4201" # Terminal WebSocket

    volumes:
      # Docker socket for spawning containers (DinD)
      - /var/run/docker.sock:/var/run/docker.sock

      # Workspace volume - projects to edit
      # REQUIRED: Set DAAX_WORKSPACE to your projects directory
      # Example: export DAAX_WORKSPACE="$HOME/prj"
      - ${DAAX_WORKSPACE:?DAAX_WORKSPACE env var required (absolute path, e.g. $HOME/prj — Compose does not expand ~)}:/workspace

      # Persist application data
      - daax-data:/app/data

      # Environment file for secrets (optional). If DAAX_ENV_FILE is not set,
      # /dev/null is mounted and no .env.local file will be loaded.
      # IMPORTANT: Docker Compose does not expand ~ in volume paths; use an
      # absolute path. (${VAR:-default} interpolation IS supported, as below.)
      # Example: export DAAX_ENV_FILE="$HOME/.daax.env"
      - ${DAAX_ENV_FILE:-/dev/null}:/app/.env.local:ro

      # Claude Code config file for MCP management (/mcp page)
      # REQUIRED: Set CLAUDE_CONFIG_PATH to your Claude config file
      # Example: export CLAUDE_CONFIG_PATH="$HOME/.claude.json"
      - ${CLAUDE_CONFIG_PATH:?CLAUDE_CONFIG_PATH env var required (absolute path, e.g. $HOME/.claude.json — Compose does not expand ~)}:/host-config/.claude.json:rw

      # Home .mcp.json for additional MCP configurations (optional)
      # If HOME_MCP_JSON_PATH is not set, /dev/null is mounted (no error)
      # Example: export HOME_MCP_JSON_PATH="$HOME/.mcp.json"
      - ${HOME_MCP_JSON_PATH:-/dev/null}:/host-config/.mcp.json:ro

    environment:
      # Bind to all interfaces inside container
      - TERMINAL_HOST=0.0.0.0

      # Terminal WS auth (F1b, #95). REQUIRED in container mode: a connection
      # through Docker's published port arrives from the bridge gateway (not
      # loopback), so the loopback bypass/forwarded path do not apply and the
      # terminal uses the bearer-ticket path — which needs this secret on both
      # the app (mint) and terminal server (verify), same container = one value.
      # Generate: `openssl rand -hex 32`. Never commit it. Set DAAX_REQUIRE_AUTH=1
      # to enforce identity (with Traefik/Pocket ID) on any untrusted exposure.
      - DAAX_REQUIRE_AUTH=${DAAX_REQUIRE_AUTH:-}
      - "DAAX_WS_TOKEN_SECRET=${DAAX_WS_TOKEN_SECRET:?required for terminal WS auth; generate with openssl rand -hex 32}"

      # HTTP proxy-secret trust boundary (F1a, #94/#191). The app MUST receive the
      # same value deploy-local.sh renders into Traefik's inject-proxy-secret
      # middleware (X-Daax-Proxy-Secret), or enabling strict mode
      # (DAAX_REQUIRE_AUTH=1) per the hardening steps above fails closed and locks
      # out ALL forwarded identity — a login lockout. Opt-in: the empty default
      # keeps the boundary disabled and stays in sync with deploy-local.sh, which
      # also renders an empty header (and warns) when unset. _PREVIOUS is accepted
      # too, so the secret rotates without an auth outage (matches WS secret).
      - DAAX_PROXY_SECRET=${DAAX_PROXY_SECRET:-}
      - DAAX_PROXY_SECRET_PREVIOUS=${DAAX_PROXY_SECRET_PREVIOUS:-}

      # Postgres connection (brain2daax Phase 0 #92). Reaches the postgres
      # service over daax-net; password sourced from env/secret, never committed.
      - DATABASE_URL=postgres://${DAAX_PG_USER:-daax}:${DAAX_PG_PASSWORD:?DAAX_PG_PASSWORD env var required}@postgres:5432/${DAAX_PG_DB:-daax}

      # Claude Code config path (for MCP management)
      - CLAUDE_CODE_CONFIG=/host-config/.claude.json

      # Home .mcp.json path (for additional MCP configurations)
      # NOTE: Only set when HOME_MCP_JSON_PATH is configured, otherwise app
      # will scan /workspace for .mcp.json files instead
      - HOME_MCP_JSON=${HOME_MCP_JSON_PATH:+/host-config/.mcp.json}

      # WebSocket URL - set to your domain
      - NEXT_PUBLIC_TERMINAL_WS_URL=${TERMINAL_WS_URL:-wss://daax.${HOSTNAME}.poley.dev/ws}

      # Code-Server URL - set to your domain
      - NEXT_PUBLIC_CODE_SERVER_URL=${CODE_SERVER_URL:-https://daax-code.${HOSTNAME}.poley.dev/?folder=/workspace}

      # Container image for AI tools
      - CLAUDE_CONTAINER_IMAGE=${CLAUDE_CONTAINER_IMAGE:-jpoley/daax-agents:latest}

      # Docker network for spawned containers. Must track the real external
      # network name (overridable via DAAX_NETWORK in deploy-local.sh) so
      # spawned containers attach to the same network as daax itself.
      - DOCKER_NETWORK=${DAAX_NETWORK:-daax-net}

      # Host workspace path for volume mounts in spawned containers
      - HOST_WORKSPACE_PATH=${DAAX_WORKSPACE:?DAAX_WORKSPACE required}

      # Default mount path inside containers
      - DEFAULT_MOUNT_PATH=/workspace

      # GitHub token (optional)
      - GITHUB_DAAX=${GITHUB_DAAX:-}

      # Clawdbot gateway (optional - required for /bot page)
      - CLAWD_GATEWAY_URL=${CLAWD_GATEWAY_URL:-}
      - CLAWD_GATEWAY_TOKEN=${CLAWD_GATEWAY_TOKEN:-}

    # Docker socket access
    group_add:
      - "${DOCKER_GID:-999}"

    networks:
      - daax-net

    # Deep probe (brain2daax F7, #98): /api/health checks Postgres + terminal
    # reachability and returns 503 when a dependency is down. Longer start-period
    # than the old shallow `/` check — the app must also reach DB + terminal at
    # boot. (daax-terminal gets its own probe when F3 splits the services.)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Code-Server (VS Code in browser) with language runtimes (Go, Node, Python, Rust)
  # Accessible via https://daax-code.HOSTNAME.poley.dev
  # NOTE: build context lives in the sibling daax-devtools repo. If that repo
  # is not cloned alongside daax-web, only build/start this service after
  # pulling a pre-built image via `docker pull daax-code-server:latest`.
  code-server:
    build:
      context: ../../daax-devtools/devcontainer
      dockerfile: Dockerfile.code-server
    image: daax-code-server:latest
    container_name: daax-code-server
    restart: unless-stopped

    ports:
      # Traefik routes daax-code.HOSTNAME.poley.dev -> port 18080
      - "127.0.0.1:18080:8080"

    volumes:
      # Same workspace as daax - edit the same files
      - ${DAAX_WORKSPACE:?DAAX_WORKSPACE env var required}:/workspace
      # Persist code-server settings and extensions
      - daax-code-server-data:/home/coder/.local/share/code-server

    command: ["--auth", "none", "--bind-addr", "0.0.0.0:8080", "/workspace"]

    environment:
      - CS_DISABLE_GETTING_STARTED_OVERRIDE=1

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: whoami service for testing
  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    profiles:
      - debug
    ports:
      - "127.0.0.1:8081:80"

networks:
  daax-net:
    # `name` is the real external network; the `daax-net` key above is just a
    # stable in-compose alias. Override the real name with DAAX_NETWORK to keep
    # this in sync with deploy-local.sh (which creates $DAAX_NETWORK).
    # Must be created before first run: docker network create "$DAAX_NETWORK".
    name: ${DAAX_NETWORK:-daax-net}
    external: true

volumes:
  daax-data:
    driver: local
  daax-code-server-data:
    driver: local
  daax-pg-data:
    driver: local
