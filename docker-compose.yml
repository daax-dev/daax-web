# Daax Local Development
#
# Usage:
#   ./rebuild.sh              # Build and run via docker compose
#   docker compose logs -f    # View logs
#   docker compose down       # Stop
#
# Required: DAAX_PG_PASSWORD must be set (no weak default). For throwaway local
# dev, export a value first (e.g. `export DAAX_PG_PASSWORD=$(openssl rand -hex 16)`
# or any local-only value). NEVER reuse a local value for a network-reachable
# deployment. `docker compose up` fails fast with a clear error if it is unset.

services:
  # Postgres — daax's single data engine (brain2daax Phase 0 #92).
  # Persistent named volume so data survives `docker compose restart`/`down`.
  postgres:
    # Digest-pinned (#203): multi-arch index digest so a registry-side tag update
    # cannot silently swap the image. Bump via Renovate/Dependabot for patches.
    image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
    container_name: daax-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DAAX_PG_USER:-daax}
      # Fail-closed: no weak default (matches deploy/docker-compose.yml). Even on
      # loopback, any container on daax-net (incl. spawned agent containers) can
      # reach postgres:5432, so a guessable shared default is unsafe. See #196.
      - POSTGRES_PASSWORD=${DAAX_PG_PASSWORD:?DAAX_PG_PASSWORD env var required (set a strong secret; never commit it)}
      - POSTGRES_DB=${DAAX_PG_DB:-daax}
    ports:
      # Loopback-only: app reaches it via the daax-net hostname `postgres`.
      - "127.0.0.1:5432:5432"
    volumes:
      # postgres:18 stores data under a version subdir; mount the PARENT so
      # PGDATA (/var/lib/postgresql/<ver>/docker) lands on the volume and
      # persists. Mounting /var/lib/postgresql/data instead silently moves
      # PGDATA off-volume and the image refuses to start.
      - daax-pg-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DAAX_PG_USER:-daax} -d ${DAAX_PG_DB:-daax}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - daax-net

  # One-shot: apply pending migrations, then exit. Runs the daax image's
  # `bun run db:migrate`. The app waits on this completing successfully, so app
  # boot is NOT coupled to Postgres directly (only the compose path gates on it).
  migrate:
    image: daax:local
    container_name: daax-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DAAX_PG_USER:-daax}:${DAAX_PG_PASSWORD:?DAAX_PG_PASSWORD env var required}@postgres:5432/${DAAX_PG_DB:-daax}
    command: ["bun", "run", "db:migrate"]
    networks:
      - daax-net

  daax:
    build:
      context: .
      dockerfile: Dockerfile
    image: daax:local
    container_name: daax
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    # Hardening (#185). no-new-privileges blocks setuid/setgid escalation from
    # any process inside the container (bounds the blast radius of an in-app RCE).
    # NOT YET done (require verification we cannot do offline, and would break
    # functionality if applied naively):
    #   - Non-root USER: the app needs docker.sock access to spawn agent
    #     containers; the socket is root:docker, so a non-root USER must join the
    #     docker group with a GID matching the HOST socket (DOCKER_GID build arg +
    #     group_add). Applying `USER node` without that alignment breaks spawning.
    #   - cap_drop: [ALL]: the app writes the host-owned .claude.json mounted :rw,
    #     which a uid-0 process needs CAP_DAC_OVERRIDE for — a blanket drop would
    #     break MCP config writes. Requires per-capability analysis + a live test.
    # See #185 follow-up: non-root + docker-GID alignment + scoped cap_drop.
    security_opt:
      - no-new-privileges:true

    ports:
      - "4200:4200"
      - "4201:4201"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Docker socket for spawning containers
      - /var/run/docker.sock:/var/run/docker.sock

      # Workspace volume
      - ${DAAX_WORKSPACE:-${HOME}/prj}:/workspace

      # Claude config
      - ${CLAUDE_CONFIG_PATH:-${HOME}/.claude.json}:/host-config/.claude.json:rw

      # Claude projects dir
      - ${CLAUDE_DIR:-${HOME}/.claude}:/host-claude:ro

      # Home MCP config (optional)
      - ${HOME_MCP_PATH:-/dev/null}:/host-config/.mcp.json:ro

    environment:
      - DOCKER_NETWORK=daax-net
      - HOST_WORKSPACE_PATH=${DAAX_WORKSPACE:-${HOME}/prj}
      - CLAUDE_CODE_CONFIG=/host-config/.claude.json
      - CLAUDE_PROJECTS_DIR=/host-claude/projects
      - NEXT_PUBLIC_DEPLOYMENT_MODE=container
      - TERMINAL_HOST=0.0.0.0
      # Terminal WS auth (F1b, #95). REQUIRED in container mode: connections
      # arrive from the Docker bridge gateway (not loopback), so the terminal
      # uses the bearer-ticket path, which needs this secret on both the app
      # (mint) and terminal server (verify) — same container = one value.
      # Generate: `openssl rand -hex 32`. Never commit it.
      - DAAX_REQUIRE_AUTH=${DAAX_REQUIRE_AUTH:-}
      - "DAAX_WS_TOKEN_SECRET=${DAAX_WS_TOKEN_SECRET:?required for terminal WS auth; generate with openssl rand -hex 32}"
      # LOCAL_OPERATOR bypass posture (F-C2, #184). The HTTP plane can't see the
      # TCP peer (plain `next start`, no custom server), so the uncredentialed
      # "trusted local operator" bypass is gated on deployment posture instead.
      # HOST=0.0.0.0 marks this container as EXPOSED beyond loopback, so the
      # bypass is DISABLED by default: an uncredentialed request gets 401 rather
      # than being trusted as the operator (any tailnet peer could reach the port).
      # The exposed bind ALSO refuses forwarded identity (X-Forwarded-User)
      # while DAAX_PROXY_SECRET is unset — see the proxy-secret comment below —
      # so a peer cannot self-authenticate with one spoofed header either.
      # To run proxy-less on a trusted tailnet and intentionally trust EVERY peer
      # that can reach 4200, set DAAX_TRUST_LOCAL_OPERATOR=1. Preferred instead:
      # front with the Pocket ID proxy and set DAAX_REQUIRE_AUTH=1.
      - HOST=0.0.0.0
      - DAAX_TRUST_LOCAL_OPERATOR=${DAAX_TRUST_LOCAL_OPERATOR:-}
      # HTTP proxy-secret trust boundary (F1a, #94/#191). The app must receive the
      # SAME value Traefik injects as X-Daax-Proxy-Secret, or enabling strict mode
      # (DAAX_REQUIRE_AUTH=1) fails closed and locks out all forwarded identity.
      # The empty default stays in sync with deploy-local.sh (which also renders
      # an empty header when unset), but on THIS compose file it is NOT legacy
      # behavior: HOST=0.0.0.0 is an exposed bind, so with the secret unset,
      # forwarded identity is REFUSED (fail-closed, #184 review) — any peer that
      # can reach 4200 could forge X-Forwarded-User. Set the secret (with Traefik
      # injecting it) to authenticate forwarded identity on this path.
      # _PREVIOUS is accepted too, so the secret can be rotated without an outage.
      - DAAX_PROXY_SECRET=${DAAX_PROXY_SECRET:-}
      - DAAX_PROXY_SECRET_PREVIOUS=${DAAX_PROXY_SECRET_PREVIOUS:-}
      - DATABASE_URL=postgres://${DAAX_PG_USER:-daax}:${DAAX_PG_PASSWORD:?DAAX_PG_PASSWORD env var required}@postgres:5432/${DAAX_PG_DB:-daax}
      - HOME_MCP_JSON=${HOME_MCP_PATH:+/host-config/.mcp.json}

      # Clawd Gateway (optional, for Bot feature)
      # Set CLAWD_GATEWAY_URL and CLAWD_GATEWAY_TOKEN env vars, or use defaults below
      # Note: Use https:// for iframe embedding (not wss:// which is for WebSocket)
      - CLAWD_GATEWAY_URL=${CLAWD_GATEWAY_URL:-https://clawd.${HOSTNAME}.poley.dev}
      - CLAWD_GATEWAY_TOKEN=${CLAWD_GATEWAY_TOKEN:-}

    networks:
      - daax-net

networks:
  daax-net:
    external: true

volumes:
  daax-pg-data:
    driver: local
